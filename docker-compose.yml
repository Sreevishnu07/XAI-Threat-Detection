version: "3.9"

services:
  api:
    container_name: xai-api
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    restart: always

  streamlit:
    build:
      context: .
      dockerfile: streamlit/Dockerfile
    container_name: xai-streamlit
    ports:
      - "8501:8501"
    depends_on:
      - api
