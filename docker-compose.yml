services:
  api:
    container_name: xai-api

    build:
      context: .
      dockerfile: app/Dockerfile

    ports:
      - "8000:8000"

    volumes:
      - ./app:/app/app

    working_dir: /app

    environment:
      - PYTHONUNBUFFERED=1
      - ENV=development

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    restart: unless-stopped
