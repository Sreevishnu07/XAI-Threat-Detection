<!DOCTYPE html>
<html>
<head>
    <title>XAI Threat Detection</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            color: #38bdf8;
        }

        .container {
            margin-top: 30px;
        }

        input, button {
            padding: 10px;
            margin: 10px;
        }

        button {
            background: #22c55e;
            border: none;
            cursor: pointer;
        }

        .images {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        img {
            width: 250px;
            border-radius: 10px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            width: 400px;
            border-radius: 12px;
        }

        .high { color: red; }
        .medium { color: orange; }
        .safe { color: lightgreen; }

        .bar {
            height: 20px;
            border-radius: 10px;
            background: #334155;
            margin-top: 10px;
        }

        .fill {
            height: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>XAI Threat Detection System</h1>

<div class="container">
    <input type="file" id="fileInput">
    <button onclick="upload()">Analyze</button>
</div>

<div class="images">
    <div>
        <h3>Original</h3>
        <img id="original">
    </div>

    <div>
        <h3>Grad-CAM</h3>
        <img id="gradcam">
    </div>
</div>

<div class="card" id="result"></div>

<script>
async function upload() {
    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("Select a file");

    document.getElementById("original").src = URL.createObjectURL(file);

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("http://localhost:8000/predict-xai", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    document.getElementById("gradcam").src =
        "data:image/jpeg;base64," + data.gradcam;

    let levelClass = data.threat_level.toLowerCase();

    let width = data.threat_score * 100;

    document.getElementById("result").innerHTML = `
        <h2>${data.prediction.label}</h2>
        <p>Confidence: ${data.prediction.confidence}</p>

        <p class="${levelClass}">
            Threat Level: ${data.threat_level}
        </p>

        <div class="bar">
            <div class="fill" style="
                width:${width}%;
                background:${getColor(data.threat_score)};
            "></div>
        </div>

        <p>Focus Score: ${data.focus_score}</p>

        <h3>Top Predictions</h3>
        ${data.prediction.top_k.map(p => `
            <p>${p.label} : ${p.confidence}</p>
        `).join("")}
    `;
}

function getColor(score) {
    if (score > 0.7) return "red";
    if (score > 0.4) return "orange";
    return "green";
}
</script>

</body>
</html>
