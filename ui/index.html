<!DOCTYPE html>
<html>
<head>
    <title>XAI Threat Intelligence</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0b1220;
            color: #e2e8f0;
            text-align: center;
        }

        h1 {
            color: #38bdf8;
            margin-top: 20px;
        }

        .container {
            margin-top: 30px;
        }

        input, button {
            padding: 10px;
            margin: 10px;
            border-radius: 6px;
        }

        button {
            background: #38bdf8;
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: black;
        }

        .images {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .img-box {
            text-align: center;
        }

        img {
            width: 240px;
            border-radius: 10px;
            background: white;
            padding: 5px;
        }

        .card {
            background: #111827;
            padding: 20px;
            margin: 30px auto;
            width: 450px;
            border-radius: 12px;
            text-align: left;
        }

        .high { color: #ef4444; }
        .medium { color: #f59e0b; }
        .safe { color: #22c55e; }

        .bar {
            height: 12px;
            border-radius: 6px;
            background: #1f2937;
            margin-top: 10px;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            border-radius: 6px;
        }

        .scores {
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>XAI Threat Intelligence System</h1>

<div class="container">
    <input type="file" id="fileInput">
    <button onclick="upload()">Analyze</button>
</div>

<div class="images">
    <div class="img-box">
        <h4>Original</h4>
        <img id="original">
    </div>

    <div class="img-box">
        <h4>Grad-CAM++</h4>
        <img id="gradcam">
    </div>

    <div class="img-box">
        <h4>Score-CAM</h4>
        <img id="scorecam">
    </div>

    <div class="img-box">
        <h4>Integrated Gradients</h4>
        <img id="ig">
    </div>
</div>

<div class="card" id="result"></div>

<script>
async function upload() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Select a file first");
        return;
    }

    document.getElementById("original").src = URL.createObjectURL(file);

    const formData = new FormData();
    formData.append("file", file);

    try {
        const res = await fetch("http://localhost:8000/predict-xai", {
            method: "POST",
            body: formData
        });

        const data = await res.json();
        console.log(data);

        // Set images
        document.getElementById("gradcam").src =
            "data:image/jpeg;base64," + data.xai.gradcam_pp;

        document.getElementById("scorecam").src =
            "data:image/jpeg;base64," + data.xai.scorecam;

        document.getElementById("ig").src =
            "data:image/jpeg;base64," + data.xai.integrated_gradients;

        let levelClass = data.threat_level.toLowerCase();
        let width = data.threat_score * 100;

        document.getElementById("result").innerHTML = `
            <h2>${data.prediction.label}</h2>

            <p><b>Confidence:</b> ${data.prediction.confidence}</p>

            <p class="${levelClass}">
                Threat Level: ${data.threat_level}
            </p>

            <div class="bar">
                <div class="fill" style="
                    width:${width}%;
                    background:${getColor(data.threat_score)};
                "></div>
            </div>

            <p><b>Threat Score:</b> ${data.threat_score}</p>

            <div class="scores">
                <p>GradCAM++ Focus: ${data.focus_scores.gradcam_pp}</p>
                <p>ScoreCAM Focus: ${data.focus_scores.scorecam}</p>
                <p>IG Focus: ${data.focus_scores.integrated_gradients}</p>
            </div>
        `;

    } catch (err) {
        console.error(err);
    }
}

function getColor(score) {
    if (score > 0.75) return "#ef4444";
    if (score > 0.45) return "#f59e0b";
    return "#22c55e";
}
</script>

</body>
</html>
