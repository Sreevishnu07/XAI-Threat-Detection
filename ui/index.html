<!DOCTYPE html>
<html>
<head>
    <title>XAI Threat Detection</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            color: #38bdf8;
        }

        .container {
            margin-top: 30px;
        }

        input, button {
            padding: 10px;
            margin: 10px;
        }

        button {
            background: #22c55e;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .images {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        img {
            width: 260px;
            border-radius: 12px;
            background: white;
            padding: 10px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 30px auto;
            width: 420px;
            border-radius: 15px;
            text-align: left;
        }

        .high { color: red; font-weight: bold; }
        .medium { color: orange; font-weight: bold; }
        .safe { color: lightgreen; font-weight: bold; }

        .bar {
            height: 20px;
            border-radius: 10px;
            background: #334155;
            margin-top: 10px;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>🔍 XAI Threat Detection System</h1>

<div class="container">
    <input type="file" id="fileInput">
    <button onclick="upload()">Analyze</button>
</div>

<div class="images">
    <div>
        <h3>Original</h3>
        <img id="original">
    </div>

    <div>
        <h3>Grad-CAM</h3>
        <img id="gradcam">
    </div>
</div>

<div class="card" id="result"></div>

<script>
async function upload() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Select a file first");
        return;
    }

    document.getElementById("original").src = URL.createObjectURL(file);

    const formData = new FormData();
    formData.append("file", file);

    try {
        const res = await fetch("http://localhost:8000/predict-xai", {
            method: "POST",
            body: formData
        });

        const data = await res.json();
        console.log("API RESPONSE:", data);

        if (!data || !data.threat_score) {
            document.getElementById("result").innerHTML =
                "<p style='color:red;'>Error: No response from backend</p>";
            return;
        }

        // Show Grad-CAM
        document.getElementById("gradcam").src =
            "data:image/jpeg;base64," + data.gradcam;

        // Threat level class
        let levelClass = data.threat_level.toLowerCase();

        // Bar width
        let width = data.threat_score * 100;

        // Render UI
        document.getElementById("result").innerHTML = `
            <h2>${data.prediction.label}</h2>

            <p><b>Confidence:</b> ${data.prediction.confidence}</p>

            <p class="${levelClass}">
                Threat Level: ${data.threat_level}
            </p>

            <div class="bar">
                <div class="fill" style="
                    width:${width}%;
                    background:${getColor(data.threat_score)};
                "></div>
            </div>

            <p><b>Threat Score:</b> ${data.threat_score}</p>
            <p><b>Focus Score:</b> ${data.focus_score}</p>
        `;

    } catch (err) {
        console.error(err);
        document.getElementById("result").innerHTML =
            "<p style='color:red;'>Request failed</p>";
    }
}

function getColor(score) {
    if (score > 0.7) return "red";
    if (score > 0.4) return "orange";
    return "green";
}
</script>

</body>
</html>
