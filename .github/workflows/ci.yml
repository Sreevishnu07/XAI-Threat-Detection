name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test-build-push:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install API dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Streamlit dependencies
        run: |
          pip install -r streamlit/requirements.txt

      - name: Run tests
        run: |
          pytest

      - name: Build API Docker Image
        run: |
          docker build -t xai-api -f app/Dockerfile .

      - name: Build Streamlit Docker Image
        run: |
          docker build -t xai-streamlit -f streamlit/dockerfile ./streamlit

      - name: Start Docker Compose
        run: |
          docker compose up -d

      - name: Wait for API to be ready
        run: |
          sleep 20
          curl --fail http://localhost:8000/ || exit 1

      - name: Test API health
        run: |
          curl http://localhost:8000/

      - name: Stop containers
        run: docker compose down

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push API Image
        run: |
          docker tag xai-api ${{ secrets.DOCKER_USERNAME }}/xai-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/xai-api:latest

      - name: Push Streamlit Image
        run: |
          docker tag xai-streamlit ${{ secrets.DOCKER_USERNAME }}/xai-streamlit:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/xai-streamlit:latest
