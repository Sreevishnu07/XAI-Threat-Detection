name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install API dependencies
        run: pip install -r requirements.txt

      - name: Install Streamlit dependencies
        run: pip install -r streamlit/requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Run tests
        run: pytest


  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build API Docker Image
        run: docker build -t xai-api -f app/Dockerfile .

      - name: Build Streamlit Docker Image
        run: docker build -t xai-streamlit -f streamlit/Dockerfile .

      - name: Start containers
        run: docker compose up -d

      - name: Wait for API to be ready
        run: |
          for i in {1..10}; do
            if curl -s http://localhost:8000/ > /dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 5
          done
          echo "API failed to start"
          exit 1

      - name: Install test dependencies
        run: |
          pip install -r requirements.txt

      - name: Integration Test (API end-to-end)
        run: |
          python - <<EOF
          import requests
          from PIL import Image
          import io
          
          url = "http://localhost:8000/predict"
          
          img = Image.new("RGB", (10, 10), color="white")
          buf = io.BytesIO()
          img.save(buf, format="JPEG")
          buf.seek(0)

          files = {"file": ("test.jpg", buf, "image/jpeg")}
          r = requests.post(url, files=files)

          assert r.status_code == 200
          print("Integration test passed")
          EOF
          
      - name: Stop containers
        run: docker compose down


  push:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build images again
        run: |
          docker build -t xai-api -f app/Dockerfile .
          docker build -t xai-streamlit -f streamlit/Dockerfile .

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push API Image
        run: |
          docker tag xai-api ${{ secrets.DOCKER_USERNAME }}/xai-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/xai-api:latest

      - name: Push Streamlit Image
        run: |
          docker tag xai-streamlit ${{ secrets.DOCKER_USERNAME }}/xai-streamlit:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/xai-streamlit:latest


  deploy:
    runs-on: ubuntu-latest
    needs: push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/"

      - name: Deploy using Docker Compose
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~
            
            docker system prune -a -f --volumes
            docker builder prune -a -f
            
            docker pull svish07/xai-api:latest
            docker pull svish07/xai-streamlit:latest
            docker pull redis:7
            
            docker stop xai-api || true
            docker rm xai-api || true
            
            docker stop xai-streamlit || true
            docker rm xai-streamlit || true
            
            docker stop xai-redis || true
            docker rm xai-redis || true
            
            docker network create xai-network || true
            
            docker run -d \
              --name xai-redis \
              --network xai-network \
              --restart always \
              redis:7
            
            sleep 5
            
            docker run -d \
              --name xai-api \
              --network xai-network \
              -p 8000:8000 \
              --restart always \
              svish07/xai-api:latest
            
            docker run -d \
              --name xai-streamlit \
              --network xai-network \
              -p 8501:8501 \
              --restart always \
              svish07/xai-streamlit:latest
